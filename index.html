<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Photo Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

<h1>Interactive Photo Gallery</h1>
<p>Use mouse or keyboard to interact with the images.</p>

<section class="gallery">

    <figure>
        <img src="images/img1.jpg" alt="Description of image 1"
             onmouseover="highlightImage(event)"
             onmouseleave="removeHighlight(event)"
             onfocus="focusHighlight(event)"
             onblur="blurHighlight(event)">
    </figure>

    <figure>
        <img src="images/img2.jpg" alt="Description of image 2"
             onmouseover="highlightImage(event)"
             onmouseleave="removeHighlight(event)"
             onfocus="focusHighlight(event)"
             onblur="blurHighlight(event)">
    </figure>

    <figure>
        <img src="images/img3.jpg" alt="Description of image 3"
             onmouseover="highlightImage(event)"
             onmouseleave="removeHighlight(event)"
             onfocus="focusHighlight(event)"
             onblur="blurHighlight(event)">
    </figure>

    <figure>
        <img src="images/img4.jpg" alt="Description of image 4"
             onmouseover="highlightImage(event)"
             onmouseleave="removeHighlight(event)"
             onfocus="focusHighlight(event)"
             onblur="blurHighlight(event)">
    </figure>

    <figure>
        <img src="images/img5.jpg" alt="Description of image 5"
             onmouseover="highlightImage(event)"
             onmouseleave="removeHighlight(event)"
             onfocus="focusHighlight(event)"
             onblur="blurHighlight(event)">
    </figure>

    <figure>
        <img src="images/img6.jpg" alt="Description of image 6"
             onmouseover="highlightImage(event)"
             onmouseleave="removeHighlight(event)"
             onfocus="focusHighlight(event)"
             onblur="blurHighlight(event)">
    </figure>

</section>

</body>
</html>
